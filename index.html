<!DOCTYPE html>
<html>
<head>
  <title>Otaku Tiers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f1a;
      color: white;
      max-width: 420px;
      margin: auto;
    }

    .header {
      text-align: center;
      padding: 15px 0;
    }

    .header img {
      width: 180px;
    }

    .search {
      width: 90%;
      margin: auto;
      margin-bottom: 10px;
    }

    .search input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #1a2133;
      color: white;
      outline: none;
    }

    .card {
      width: 90%;
      margin: 10px auto;
      background: #141a2b;
      border-radius: 12px;
      padding: 12px;
    }

    .player {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .player img {
      width: 42px;
      border-radius: 8px;
    }

    .name {
      font-weight: bold;
      font-size: 15px;
    }

    .meta {
      font-size: 12px;
      color: #aaa;
    }

    .icons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .icon {
      text-align: center;
    }

    .icon img {
      width: 32px;
      height: 32px;
      image-rendering: pixelated;
      background: #0b0f1a;
      border-radius: 50%;
      padding: 6px;
      border: 2px solid #d4af37;
    }

    .tier {
      margin-top: 3px;
      font-size: 10px;
      padding: 2px 5px;
      border-radius: 4px;
      background: #d4af37;
      color: black;
      font-weight: bold;
    }

    .lt {
      background: #3b82ff;
      color: white;
    }

  </style>
</head>

<body>

<div class="header">
  <!-- if image not working, replace with text -->
  <h2>OTAKU TIERS</h2>
</div>

<div class="search">
  <input placeholder="Search player...">
</div>

<div class="card">

  <div class="player">
    <img src="https://mc-heads.net/avatar/Steve">
    <div>
      <div class="name">Player Name</div>
      <div class="meta">NA • Combat Ace</div>
    </div>
  </div>

  <div class="icons">

    <div class="icon"><img src="icons/crystal.png"><div class="tier">HT1</div></div>
    <div class="icon"><img src="icons/sword.png"><div class="tier">HT1</div></div>
    <div class="icon"><img src="icons/axe.png"><div class="tier lt">LT1</div></div>
    <div class="icon"><img src="icons/helmet.png"><div class="tier lt">LT1</div></div>
    <div class="icon"><img src="icons/mace.png"><div class="tier">HT1</div></div>
    <div class="icon"><img src="icons/potion.png"><div class="tier">HT1</div></div>
    <div class="icon"><img src="icons/potion.png"><div class="tier lt">LT2</div></div>
    <div class="icon"><img src="icons/sword.png"><div class="tier">HT2</div></div>

  </div>

</div>

</body>
</html>
